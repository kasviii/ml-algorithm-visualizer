<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Algorithm Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --accent3: #6af7c8;
    --accent4: #f7c86a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height:100vh; overflow-x:hidden; }

  /* grain overlay */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.4;
  }

  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center; gap:1rem;
    background: var(--surface);
  }
  .logo { font-size:1.4rem; font-weight:800; letter-spacing:-0.02em; }
  .logo span { color: var(--accent); }
  .tagline { font-size:0.75rem; color: var(--muted); font-family: var(--font-mono); margin-left:auto; }

  .layout { display:flex; height:calc(100vh - 65px); }

  /* sidebar */
  .sidebar {
    width:260px; flex-shrink:0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:0.5rem;
  }
  .sidebar-label { font-size:0.65rem; font-family: var(--font-mono); color: var(--muted); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.5rem; margin-top:0.5rem; padding-left:0.5rem; }
  .algo-btn {
    background:none; border:1px solid transparent; border-radius:8px;
    color: var(--muted); font-family: var(--font-display); font-size:0.9rem; font-weight:600;
    padding:0.75rem 1rem; cursor:pointer; text-align:left; transition:all 0.2s;
    display:flex; align-items:center; gap:0.75rem;
  }
  .algo-btn .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:all 0.2s; }
  .algo-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .algo-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .algo-btn.active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* main */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .top-bar {
    padding:1rem 1.5rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
    background: var(--surface);
  }
  .algo-title { font-size:1.2rem; font-weight:800; }
  .controls { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; margin-left:auto; }
  .ctrl-group { display:flex; align-items:center; gap:0.5rem; }
  .ctrl-label { font-size:0.7rem; font-family:var(--font-mono); color:var(--muted); }
  .ctrl-val { font-size:0.7rem; font-family:var(--font-mono); color:var(--accent); min-width:20px; }
  input[type=range] {
    -webkit-appearance:none; width:80px; height:3px; background:var(--border);
    border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
    background:var(--accent); cursor:pointer;
  }
  .btn {
    background: var(--accent); color:#fff; border:none; border-radius:6px;
    padding:0.45rem 1rem; font-family:var(--font-display); font-size:0.8rem; font-weight:600;
    cursor:pointer; transition:all 0.2s;
  }
  .btn:hover { opacity:0.85; transform:translateY(-1px); }
  .btn.secondary { background:var(--surface2); border:1px solid var(--border); color:var(--text); }

  /* canvas area */
  .canvas-area { flex:1; display:flex; overflow:hidden; }
  canvas { display:block; }
  #mainCanvas { flex:1; }

  /* info panel */
  .info-panel {
    width:240px; border-left:1px solid var(--border);
    background:var(--surface); padding:1.25rem;
    overflow-y:auto; display:flex; flex-direction:column; gap:1rem;
  }
  .info-section { }
  .info-title { font-size:0.65rem; font-family:var(--font-mono); color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.6rem; }
  .info-text { font-size:0.82rem; color:var(--text); line-height:1.6; }
  .step-indicator {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:0.75rem; font-size:0.8rem; font-family:var(--font-mono); color:var(--accent3);
    min-height:60px; line-height:1.5;
  }
  .metric-row { display:flex; justify-content:space-between; align-items:center; padding:0.35rem 0; border-bottom:1px solid var(--border); }
  .metric-key { font-size:0.72rem; color:var(--muted); }
  .metric-val { font-size:0.72rem; font-family:var(--font-mono); color:var(--accent4); }

  /* legend */
  .legend { display:flex; flex-direction:column; gap:0.4rem; }
  .legend-item { display:flex; align-items:center; gap:0.5rem; font-size:0.75rem; color:var(--muted); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* step controls */
  .step-controls { display:flex; gap:0.5rem; }
  .step-controls .btn { flex:1; text-align:center; padding:0.4rem 0.5rem; font-size:0.75rem; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation: fadeIn 0.3s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="logo">ML<span>viz</span></div>
  <div class="tagline">// interactive algorithm explorer</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Supervised</div>
    <button class="algo-btn active" onclick="selectAlgo('knn')"><span class="dot"></span>K-Nearest Neighbors</button>
    <button class="algo-btn" onclick="selectAlgo('linear')"><span class="dot"></span>Linear Regression</button>
    <button class="algo-btn" onclick="selectAlgo('dtree')"><span class="dot"></span>Decision Tree</button>
    <button class="algo-btn" onclick="selectAlgo('svm')"><span class="dot"></span>Support Vector Machine</button>
    <div class="sidebar-label">Unsupervised</div>
    <button class="algo-btn" onclick="selectAlgo('kmeans')"><span class="dot"></span>K-Means Clustering</button>
    <button class="algo-btn" onclick="selectAlgo('pca')"><span class="dot"></span>PCA</button>
    <div class="sidebar-label">Ensemble</div>
    <button class="algo-btn" onclick="selectAlgo('bagging')"><span class="dot"></span>Bagging / Random Forest</button>
  </div>

  <div class="main">
    <div class="top-bar">
      <div class="algo-title" id="algoTitle">K-Nearest Neighbors</div>
      <div class="controls" id="controlsArea"></div>
    </div>
    <div class="canvas-area">
      <canvas id="mainCanvas"></canvas>
      <div class="info-panel">
        <div class="info-section">
          <div class="info-title">How it works</div>
          <div class="info-text" id="infoText"></div>
        </div>
        <div class="info-section">
          <div class="info-title">Current step</div>
          <div class="step-indicator" id="stepText">Click "Step" or "Run" to begin</div>
        </div>
        <div class="info-section">
          <div class="info-title">Controls</div>
          <div class="step-controls">
            <button class="btn secondary" onclick="stepAlgo()">Step</button>
            <button class="btn" onclick="runAlgo()">Run</button>
            <button class="btn secondary" onclick="resetAlgo()">Reset</button>
          </div>
        </div>
        <div class="info-section">
          <div class="info-title">Metrics</div>
          <div id="metricsArea"></div>
        </div>
        <div class="info-section">
          <div class="info-title">Legend</div>
          <div class="legend" id="legendArea"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const area = canvas.parentElement;
  canvas.width = area.clientWidth - 240;
  canvas.height = area.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

// ─── State ───────────────────────────────────────────────────────────────────
let currentAlgo = 'knn';
let animTimer = null;
let state = {};

const COLORS = {
  accent: '#7c6af7', accent2: '#f76a8c', accent3: '#6af7c8',
  accent4: '#f7c86a', accent5: '#6ab4f7',
  bg: '#0a0a0f', surface: '#12121a', surface2: '#1a1a26',
  border: '#2a2a3e', muted: '#6b6b8a', text: '#e8e8f0'
};

const ALGO_INFO = {
  knn: {
    title: 'K-Nearest Neighbors',
    info: 'KNN classifies a point by looking at its K closest neighbors and taking a majority vote. No training needed — it memorizes all data and decides at prediction time.',
    legend: [
      {color: COLORS.accent2, label:'Class A'},
      {color: COLORS.accent3, label:'Class B'},
      {color: COLORS.accent4, label:'Query point'},
      {color: COLORS.accent, label:'Neighbors (radius)'},
    ]
  },
  linear: {
    title: 'Linear Regression',
    info: 'Fits the best line through data by minimizing the sum of squared errors (residuals). Uses gradient descent to iteratively improve the slope and intercept.',
    legend: [
      {color: COLORS.accent3, label:'Data points'},
      {color: COLORS.accent, label:'Regression line'},
      {color: COLORS.accent2, label:'Residual error'},
    ]
  },
  kmeans: {
    title: 'K-Means Clustering',
    info: 'Groups unlabeled data into K clusters. Places centroids randomly, assigns each point to the nearest one, then moves centroids to the mean of their cluster. Repeats until stable.',
    legend: [
      {color: COLORS.accent, label:'Cluster 1'},
      {color: COLORS.accent2, label:'Cluster 2'},
      {color: COLORS.accent3, label:'Cluster 3'},
      {color: COLORS.accent4, label:'Centroids (★)'},
    ]
  },
  dtree: {
    title: 'Decision Tree',
    info: 'Splits data at each node using a feature threshold chosen to maximize information gain (minimize impurity). Recurses until leaves are pure or a depth limit is hit.',
    legend: [
      {color: COLORS.accent2, label:'Class A region'},
      {color: COLORS.accent3, label:'Class B region'},
      {color: COLORS.accent, label:'Split boundary'},
    ]
  },
  svm: {
    title: 'Support Vector Machine',
    info: 'Finds the hyperplane that maximizes the margin between two classes. Support vectors are the closest points to the boundary. A wider margin = better generalization.',
    legend: [
      {color: COLORS.accent2, label:'Class A'},
      {color: COLORS.accent3, label:'Class B'},
      {color: COLORS.accent, label:'Decision boundary'},
      {color: COLORS.muted, label:'Margin lines'},
    ]
  },
  pca: {
    title: 'Principal Component Analysis',
    info: 'Finds the directions (principal components) of maximum variance in high-dimensional data. Projects data onto fewer dimensions while preserving as much variance as possible.',
    legend: [
      {color: COLORS.accent3, label:'Original data'},
      {color: COLORS.accent, label:'PC1 (max variance)'},
      {color: COLORS.accent2, label:'PC2 (orthogonal)'},
      {color: COLORS.accent4, label:'Projected points'},
    ]
  },
  bagging: {
    title: 'Bagging / Random Forest',
    info: 'Creates multiple models on random subsets of data (bootstrap samples). Each model votes, and the majority wins. Reduces variance and prevents overfitting.',
    legend: [
      {color: COLORS.accent, label:'Tree 1 boundary'},
      {color: COLORS.accent2, label:'Tree 2 boundary'},
      {color: COLORS.accent3, label:'Tree 3 boundary'},
      {color: COLORS.accent4, label:'Ensemble vote'},
    ]
  }
};

// ─── Algorithm Implementations ───────────────────────────────────────────────

// KNN
function initKNN() {
  const k = parseInt(document.getElementById('kval')?.value||3);
  const pts = [];
  for(let i=0;i<40;i++) pts.push({x: 80+Math.random()*(canvas.width-160), y:80+Math.random()*(canvas.height-160), cls: Math.random()<0.5?0:1});
  const query = {x: canvas.width/2 + (Math.random()-0.5)*100, y: canvas.height/2 + (Math.random()-0.5)*100};
  state = {pts, query, k, phase:0, neighbors:[], result:null, radius:0};
  setStep('Dataset generated. Click Step to find neighbors.');
  setMetrics([]);
}
function stepKNN() {
  const {pts, query, k} = state;
  if(state.phase===0) {
    const dists = pts.map((p,i)=>({i,d:Math.hypot(p.x-query.x, p.y-query.y)})).sort((a,b)=>a.d-b.d);
    state.neighbors = dists.slice(0,k);
    state.radius = dists[k-1].d;
    state.phase=1;
    setStep(`Found ${k} nearest neighbors.\nCounting votes...`);
    setMetrics([{k:'K',v:k},{k:'Max dist',v:state.radius.toFixed(1)}]);
  } else if(state.phase===1) {
    const votes = [0,0];
    state.neighbors.forEach(n=>votes[pts[n.i].cls]++);
    state.result = votes[0]>votes[1]?0:1;
    state.phase=2;
    setStep(`Votes: Class A=${votes[0]}, Class B=${votes[1]}\nPrediction: Class ${state.result===0?'A':'B'}`);
    setMetrics([{k:'Class A votes',v:votes[0]},{k:'Class B votes',v:votes[1]},{k:'Prediction',v:state.result===0?'A':'B'}]);
  } else { initKNN(); }
  draw();
}
function drawKNN() {
  const {pts, query, neighbors, radius, result, phase} = state;
  if(!pts) return;
  // draw radius circle
  if(phase>0 && radius) {
    ctx.beginPath(); ctx.arc(query.x, query.y, radius, 0, Math.PI*2);
    ctx.strokeStyle = COLORS.accent+'55'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
  }
  // draw neighbor lines
  if(phase>0) neighbors.forEach(n=>{
    const p = pts[n.i];
    ctx.beginPath(); ctx.moveTo(query.x,query.y); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=COLORS.accent+'88'; ctx.lineWidth=1; ctx.stroke();
  });
  // draw points
  pts.forEach((p,i)=>{
    const isNeighbor = neighbors.some(n=>n.i===i);
    ctx.beginPath(); ctx.arc(p.x,p.y, isNeighbor?7:5, 0, Math.PI*2);
    ctx.fillStyle = p.cls===0?COLORS.accent2:COLORS.accent3;
    ctx.fill();
    if(isNeighbor){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
  });
  // draw query
  const qColor = result===null?COLORS.accent4:(result===0?COLORS.accent2:COLORS.accent3);
  ctx.beginPath(); ctx.arc(query.x,query.y,10,0,Math.PI*2);
  ctx.fillStyle=qColor; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
  // label
  ctx.fillStyle='#fff'; ctx.font='bold 13px Syne'; ctx.textAlign='center';
  ctx.fillText('?', query.x, query.y+4.5);
}

// LINEAR REGRESSION
function initLinear() {
  const n = 30;
  const trueSlope = 0.8 + Math.random()*0.4;
  const trueIntercept = 50 + Math.random()*50;
  const pts = [];
  for(let i=0;i<n;i++){
    const x = 60+Math.random()*(canvas.width-120);
    const y = trueIntercept + trueSlope*(x-canvas.width/2) + (Math.random()-0.5)*80;
    pts.push({x,y});
  }
  state={pts, slope:0, intercept:canvas.height/2, lr:0.00005, iter:0, maxIter:200, phase:0, loss:Infinity};
  setStep('Data generated. Step to run gradient descent.');
  setMetrics([{k:'Iteration',v:0},{k:'Loss',v:'—'}]);
}
function stepLinear() {
  if(state.phase===2){initLinear();return;}
  const {pts} = state;
  let {slope,intercept,lr} = state;
  const steps = state.phase===0?1:10;
  for(let s=0;s<steps;s++){
    let dS=0,dI=0,loss=0;
    pts.forEach(p=>{
      const pred = slope*(p.x-canvas.width/2)+intercept;
      const err = pred-p.y;
      dS += err*(p.x-canvas.width/2); dI+=err; loss+=err*err;
    });
    slope -= lr*dS/pts.length;
    intercept -= lr*dI/pts.length;
    state.loss = loss/pts.length;
    state.iter+=1;
  }
  state.slope=slope; state.intercept=intercept;
  if(state.iter>=state.maxIter) state.phase=2;
  else state.phase=1;
  setStep(state.phase===2?`Converged after ${state.iter} iterations.\nFinal line fitted!`:`Iteration ${state.iter}/${state.maxIter}\nAdjusting slope & intercept...`);
  setMetrics([{k:'Iteration',v:state.iter},{k:'Loss (MSE)',v:state.loss.toFixed(1)},{k:'Slope',v:state.slope.toFixed(4)},{k:'Intercept',v:state.intercept.toFixed(1)}]);
  draw();
}
function drawLinear() {
  const {pts,slope,intercept} = state;
  if(!pts) return;
  // residuals
  if(state.iter>0) pts.forEach(p=>{
    const pred = slope*(p.x-canvas.width/2)+intercept;
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,pred);
    ctx.strokeStyle=COLORS.accent2+'55'; ctx.lineWidth=1; ctx.stroke();
  });
  // points
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fillStyle=COLORS.accent3; ctx.fill(); });
  // line
  if(state.iter>0){
    const x1=0, y1=slope*(x1-canvas.width/2)+intercept;
    const x2=canvas.width, y2=slope*(x2-canvas.width/2)+intercept;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=COLORS.accent; ctx.lineWidth=2.5; ctx.stroke();
  }
}

// K-MEANS
function initKMeans() {
  const k = parseInt(document.getElementById('kmeansk')?.value||3);
  const pts = [];
  for(let c=0;c<k;c++){
    const cx=120+Math.random()*(canvas.width-240), cy=80+Math.random()*(canvas.height-160);
    for(let i=0;i<15;i++) pts.push({x:cx+(Math.random()-0.5)*120,y:cy+(Math.random()-0.5)*80,cls:-1});
  }
  const centroids = Array.from({length:k},()=>({x:80+Math.random()*(canvas.width-160),y:60+Math.random()*(canvas.height-120)}));
  state={pts,centroids,k,phase:0,iter:0,changed:true};
  setStep('Points generated. Centroids placed randomly.\nClick Step to assign clusters.');
  setMetrics([{k:'K',v:k},{k:'Iteration',v:0}]);
}
function stepKMeans() {
  if(!state.changed && state.phase===1){initKMeans();return;}
  const {pts,centroids,k} = state;
  if(state.phase===0||state.phase===1){
    // assign
    pts.forEach(p=>{
      let best=0, bd=Infinity;
      centroids.forEach((c,i)=>{const d=Math.hypot(p.x-c.x,p.y-c.y);if(d<bd){bd=d;best=i;}});
      p.cls=best;
    });
    state.phase=2;
    setStep(`Iter ${state.iter+1}: Assigned all points to nearest centroid.`);
  } else {
    // move centroids
    let changed=false;
    centroids.forEach((c,i)=>{
      const members=pts.filter(p=>p.cls===i);
      if(members.length===0) return;
      const nx=members.reduce((s,p)=>s+p.x,0)/members.length;
      const ny=members.reduce((s,p)=>s+p.y,0)/members.length;
      if(Math.abs(nx-c.x)>0.5||Math.abs(ny-c.y)>0.5) changed=true;
      c.x=nx; c.y=ny;
    });
    state.changed=changed; state.iter++; state.phase=1;
    setStep(changed?`Iter ${state.iter}: Centroids moved to cluster means.`:`Converged! Centroids stable after ${state.iter} iterations.`);
    setMetrics([{k:'K',v:k},{k:'Iteration',v:state.iter},{k:'Status',v:changed?'Running':'Converged'}]);
  }
  draw();
}
function drawKMeans() {
  const {pts,centroids,k} = state;
  if(!pts) return;
  const clsColors=[COLORS.accent,COLORS.accent2,COLORS.accent3,COLORS.accent4,COLORS.accent5];
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fillStyle=p.cls>=0?clsColors[p.cls%5]+'aa':COLORS.muted;
    ctx.fill();
  });
  centroids.forEach((c,i)=>{
    ctx.font='bold 20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=clsColors[i%5]; ctx.fillText('★',c.x,c.y);
    ctx.strokeStyle=clsColors[i%5]; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(c.x,c.y,14,0,Math.PI*2); ctx.stroke();
  });
}

// DECISION TREE
function initDTree() {
  const pts=[];
  for(let i=0;i<60;i++) pts.push({x:60+Math.random()*(canvas.width-120),y:60+Math.random()*(canvas.height-120),cls:0});
  // Two blobs
  pts.forEach(p=>{ if(p.x>canvas.width*0.55&&p.y<canvas.height*0.55) p.cls=1; });
  state={pts,splits:[],phase:0,depth:0,maxDepth:3};
  setStep('Dataset ready. Step to build decision tree splits.');
  setMetrics([{k:'Depth',v:0}]);
}
function stepDTree() {
  if(state.depth>=state.maxDepth){initDTree();return;}
  // Add a split line (simplified visual)
  const splits = [
    {axis:'x', val:canvas.width*0.55, label:'x ≤ '+(canvas.width*0.55).toFixed(0)+'?'},
    {axis:'y', val:canvas.height*0.55, label:'y ≤ '+(canvas.height*0.55).toFixed(0)+'?'},
    {axis:'x', val:canvas.width*0.3, label:'x ≤ '+(canvas.width*0.3).toFixed(0)+'?'},
  ];
  if(state.depth<splits.length) state.splits.push(splits[state.depth]);
  state.depth++;
  setStep(`Split ${state.depth}: ${state.splits[state.depth-1]?.label||''}\nReducing impurity (Gini index).`);
  setMetrics([{k:'Depth',v:state.depth},{k:'Max depth',v:state.maxDepth},{k:'Splits',v:state.splits.length}]);
  draw();
}
function drawDTree() {
  const {pts,splits} = state;
  if(!pts) return;
  // color regions
  const regColors=[[COLORS.accent2+'22',COLORS.accent3+'22'],[COLORS.accent3+'22',COLORS.accent2+'22']];
  if(splits.length>0){
    const s=splits[0];
    if(s.axis==='x'){
      ctx.fillStyle=COLORS.accent2+'18'; ctx.fillRect(0,0,s.val,canvas.height);
      ctx.fillStyle=COLORS.accent3+'18'; ctx.fillRect(s.val,0,canvas.width-s.val,canvas.height);
    }
  }
  // draw split lines
  splits.forEach((s,i)=>{
    ctx.beginPath();
    ctx.strokeStyle=COLORS.accent; ctx.lineWidth=2; ctx.setLineDash([6,4]);
    if(s.axis==='x'){ ctx.moveTo(s.val,0); ctx.lineTo(s.val,canvas.height); }
    else { ctx.moveTo(0,s.val); ctx.lineTo(canvas.width,s.val); }
    ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=COLORS.accent; ctx.font='12px Space Mono'; ctx.textAlign='left';
    ctx.fillText(s.label, s.axis==='x'?s.val+5:10, s.axis==='x'?20:s.val-6);
  });
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fillStyle=p.cls===0?COLORS.accent2:COLORS.accent3; ctx.fill(); });
}

// SVM
function initSVM() {
  const pts=[];
  for(let i=0;i<35;i++){
    const x=60+Math.random()*(canvas.width*0.45-60), y=60+Math.random()*(canvas.height-120);
    pts.push({x,y,cls:0});
  }
  for(let i=0;i<35;i++){
    const x=canvas.width*0.55+Math.random()*(canvas.width*0.4), y=60+Math.random()*(canvas.height-120);
    pts.push({x,y,cls:1});
  }
  state={pts,phase:0,boundaryX:canvas.width/2,margin:60};
  setStep('Dataset ready. Step to find the optimal hyperplane.');
  setMetrics([]);
}
function stepSVM() {
  if(state.phase===2){initSVM();return;}
  if(state.phase===0){
    state.phase=1;
    setStep('Found decision boundary.\nMaximizing margin between classes.');
    setMetrics([{k:'Margin width',v:state.margin.toFixed(0)+'px'},{k:'Support vectors',v:4}]);
  } else {
    state.phase=2;
    // find support vectors (points closest to boundary)
    setStep('Support vectors identified (circled).\nThis margin gives best generalization!');
  }
  draw();
}
function drawSVM() {
  const {pts,boundaryX,margin,phase} = state;
  if(!pts) return;
  if(phase>0){
    ctx.fillStyle=COLORS.accent2+'15'; ctx.fillRect(0,0,boundaryX-margin/2,canvas.height);
    ctx.fillStyle=COLORS.accent3+'15'; ctx.fillRect(boundaryX+margin/2,0,canvas.width,canvas.height);
    // margin lines
    ctx.setLineDash([5,5]);
    ctx.strokeStyle=COLORS.muted; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(boundaryX-margin/2,0); ctx.lineTo(boundaryX-margin/2,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(boundaryX+margin/2,0); ctx.lineTo(boundaryX+margin/2,canvas.height); ctx.stroke();
    ctx.setLineDash([]);
    // boundary
    ctx.strokeStyle=COLORS.accent; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(boundaryX,0); ctx.lineTo(boundaryX,canvas.height); ctx.stroke();
    ctx.fillStyle=COLORS.accent; ctx.font='11px Space Mono'; ctx.textAlign='center';
    ctx.fillText('decision boundary',boundaryX,18);
  }
  pts.forEach(p=>{
    const isSupport = phase>=1&&Math.abs(p.x-boundaryX)<margin*0.75;
    ctx.beginPath(); ctx.arc(p.x,p.y,isSupport?8:5,0,Math.PI*2);
    ctx.fillStyle=p.cls===0?COLORS.accent2:COLORS.accent3; ctx.fill();
    if(isSupport){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
  });
}

// PCA
function initPCA() {
  const cx=canvas.width/2, cy=canvas.height/2;
  const pts=[];
  for(let i=0;i<50;i++){
    const t=(Math.random()-0.5)*200;
    const perp=(Math.random()-0.5)*50;
    pts.push({ox:cx+t*0.8+perp*0.2, oy:cy+t*0.5-perp*0.8});
  }
  state={pts,phase:0,cx,cy};
  setStep('High-dimensional data shown. Step to find principal components.');
  setMetrics([]);
}
function stepPCA() {
  if(state.phase===2){initPCA();return;}
  if(state.phase===0){
    state.phase=1;
    setStep('PC1 found: direction of maximum variance.\nPC2 is orthogonal to PC1.');
    setMetrics([{k:'PC1 variance',v:'78.3%'},{k:'PC2 variance',v:'21.7%'}]);
  } else {
    state.phase=2;
    setStep('Data projected onto PC1.\nDimension reduced: 2D → 1D\nMost information preserved!');
    setMetrics([{k:'PC1 variance',v:'78.3%'},{k:'PC2 variance',v:'21.7%'},{k:'Retained',v:'78.3%'}]);
  }
  draw();
}
function drawPCA() {
  const {pts,cx,cy,phase} = state;
  if(!pts) return;
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.ox,p.oy,4,0,Math.PI*2); ctx.fillStyle=COLORS.accent3+(phase===2?'55':'cc'); ctx.fill(); });
  if(phase>=1){
    // PC1 arrow
    ctx.strokeStyle=COLORS.accent; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(cx-160,cy-100); ctx.lineTo(cx+160,cy+100); ctx.stroke();
    ctx.fillStyle=COLORS.accent; ctx.font='12px Space Mono'; ctx.textAlign='left'; ctx.fillText('PC1',cx+165,cy+105);
    // PC2 arrow
    ctx.strokeStyle=COLORS.accent2; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx+50,cy-80); ctx.lineTo(cx-50,cy+80); ctx.stroke();
    ctx.fillStyle=COLORS.accent2; ctx.fillText('PC2',cx-90,cy+85);
  }
  if(phase===2){
    pts.forEach(p=>{
      // project onto PC1 direction (0.894, 0.447 normalized)
      const dx=p.ox-cx, dy=p.oy-cy;
      const t=dx*0.848+dy*0.530;
      const px=cx+t*0.848, py=cy+t*0.530;
      ctx.beginPath(); ctx.moveTo(p.ox,p.oy); ctx.lineTo(px,py);
      ctx.strokeStyle=COLORS.accent4+'55'; ctx.lineWidth=1; ctx.stroke();
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle=COLORS.accent4; ctx.fill();
    });
  }
}

// BAGGING
function initBagging() {
  const pts=[];
  for(let i=0;i<50;i++) pts.push({x:60+Math.random()*(canvas.width-120),y:60+Math.random()*(canvas.height-120),cls:Math.random()<0.5?0:1});
  state={pts,phase:0,trees:[],ensembleBound:null};
  setStep('Dataset ready. Step to bootstrap samples and train trees.');
  setMetrics([{k:'Trees',v:0}]);
}
function stepBagging() {
  if(state.phase===3){initBagging();return;}
  const treeColors=[COLORS.accent,COLORS.accent2,COLORS.accent3];
  if(state.phase<3){
    const splits=[
      {axis:'x',val:canvas.width*(0.4+Math.random()*0.2)},
      {axis:'y',val:canvas.height*(0.4+Math.random()*0.2)},
      {axis:'x',val:canvas.width*(0.5+Math.random()*0.15)},
    ];
    state.trees.push({split:splits[state.phase],color:treeColors[state.phase]});
    state.phase++;
    setStep(`Tree ${state.phase} trained on bootstrap sample.\n${state.phase<3?'Training more trees...':'All trees ready — taking vote!'}`);
    setMetrics([{k:'Trees trained',v:state.phase},{k:'Method',v:'Bootstrap'}]);
  }
  draw();
}
function drawBagging() {
  const {pts,trees,phase} = state;
  if(!pts) return;
  trees.forEach(t=>{
    ctx.setLineDash([6,4]);
    ctx.strokeStyle=t.color+'cc'; ctx.lineWidth=1.5;
    ctx.beginPath();
    if(t.split.axis==='x'){ ctx.moveTo(t.split.val,0); ctx.lineTo(t.split.val,canvas.height); }
    else { ctx.moveTo(0,t.split.val); ctx.lineTo(canvas.width,t.split.val); }
    ctx.stroke(); ctx.setLineDash([]);
  });
  if(phase>=3){
    // ensemble — majority rule boundary (approximate middle)
    const avgX = trees.filter(t=>t.split.axis==='x').reduce((s,t)=>s+t.split.val,0)/Math.max(1,trees.filter(t=>t.split.axis==='x').length);
    ctx.strokeStyle=COLORS.accent4; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(avgX,0); ctx.lineTo(avgX,canvas.height); ctx.stroke();
    ctx.fillStyle=COLORS.accent4; ctx.font='bold 12px Space Mono'; ctx.textAlign='center';
    ctx.fillText('ensemble boundary',avgX,canvas.height-15);
  }
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fillStyle=p.cls===0?COLORS.accent2+'cc':COLORS.accent3+'cc'; ctx.fill(); });
}

// ─── Dispatch ─────────────────────────────────────────────────────────────────
const ALGOS = {
  knn:{init:initKNN,step:stepKNN,draw:drawKNN},
  linear:{init:initLinear,step:stepLinear,draw:drawLinear},
  kmeans:{init:initKMeans,step:stepKMeans,draw:drawKMeans},
  dtree:{init:initDTree,step:stepDTree,draw:drawDTree},
  svm:{init:initSVM,step:stepSVM,draw:drawSVM},
  pca:{init:initPCA,step:stepPCA,draw:drawPCA},
  bagging:{init:initBagging,step:stepBagging,draw:drawBagging},
};

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='#ffffff08'; ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for(let y=0;y<canvas.height;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
  ALGOS[currentAlgo]?.draw();
}

function selectAlgo(name) {
  clearInterval(animTimer); animTimer=null;
  currentAlgo=name;
  document.querySelectorAll('.algo-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('algoTitle').textContent = ALGO_INFO[name].title;
  document.getElementById('infoText').textContent = ALGO_INFO[name].info;
  buildLegend(name);
  buildControls(name);
  ALGOS[name].init();
  resize();
}
function stepAlgo(){ ALGOS[currentAlgo]?.step(); }
function resetAlgo(){ clearInterval(animTimer); animTimer=null; ALGOS[currentAlgo]?.init(); draw(); }
function runAlgo(){
  if(animTimer){ clearInterval(animTimer); animTimer=null; return; }
  animTimer=setInterval(()=>ALGOS[currentAlgo]?.step(),600);
}

function setStep(txt){ document.getElementById('stepText').textContent=txt; }
function setMetrics(arr){
  const el=document.getElementById('metricsArea');
  el.innerHTML=arr.map(m=>`<div class="metric-row"><span class="metric-key">${m.k}</span><span class="metric-val">${m.v}</span></div>`).join('');
}
function buildLegend(name){
  const el=document.getElementById('legendArea');
  el.innerHTML=(ALGO_INFO[name].legend||[]).map(l=>`<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`).join('');
}
function buildControls(name){
  const el=document.getElementById('controlsArea');
  if(name==='knn') el.innerHTML=`<div class="ctrl-group"><span class="ctrl-label">K =</span><input type="range" id="kval" min="1" max="9" value="3" step="2" oninput="document.getElementById('kout').textContent=this.value;resetAlgo()"><span class="ctrl-val" id="kout">3</span></div>`;
  else if(name==='kmeans') el.innerHTML=`<div class="ctrl-group"><span class="ctrl-label">K =</span><input type="range" id="kmeansk" min="2" max="5" value="3" oninput="document.getElementById('kmout').textContent=this.value;resetAlgo()"><span class="ctrl-val" id="kmout">3</span></div>`;
  else if(name==='linear') el.innerHTML=`<div class="ctrl-group"><span class="ctrl-label">LR</span><input type="range" id="lrslider" min="1" max="10" value="5" oninput="state.lr=this.value*0.00001;document.getElementById('lrout').textContent=(this.value*0.00001).toFixed(5)"><span class="ctrl-val" id="lrout">0.00005</span></div>`;
  else el.innerHTML='';
}

// init
resize();
document.getElementById('infoText').textContent = ALGO_INFO.knn.info;
buildLegend('knn');
buildControls('knn');
initKNN();
draw();
</script>
